name: SEO Change Radar
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SEO Radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push data changes
        run: |
          git config user.name "SEO Radar Bot"
          git config user.email "radar-bot@github.com"
          git add -f data/radar.db data/discovered_urls.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update SEO data [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
